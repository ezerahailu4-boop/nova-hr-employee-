<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nova HR — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --border:#2a2a3a;
  --accent:#6c63ff;
  --accent2:#ff6584;
  --green:#00d68f;
  --yellow:#ffaa00;
  --red:#ff4757;
  --text:#e8e8f0;
  --muted:#666680;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── LOGIN ── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(108,99,255,.15),transparent),
             radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,101,132,.08),transparent),
             var(--bg)}
.login-card{width:380px;padding:48px 40px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-logo .icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.login-logo h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.login-logo p{font-size:12px;color:var(--muted);margin-top:1px}
.login-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:8px;display:block}
.login-input{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);
  padding:14px 16px;border-radius:10px;font-size:15px;font-family:var(--font);
  outline:none;transition:border-color .2s;margin-bottom:16px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#8b5cf6);
  color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;
  font-family:var(--font);transition:opacity .2s,transform .1s;margin-top:4px}
.login-btn:hover{opacity:.9}
.login-btn:active{transform:scale(.99)}
.login-err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red);
  padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none}

/* ── MAIN ── */
#main{display:none;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.header-title{font-size:15px;font-weight:600}
.header-badge{background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3);
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.header-right{display:flex;align-items:center;gap:12px}
.header-time{font-size:12px;color:var(--muted);font-family:var(--mono)}
.logout-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font);
  transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

.container{max-width:1280px;margin:0 auto;padding:28px 32px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px 24px;transition:border-color .2s}
.stat:hover{border-color:var(--accent)}
.stat-num{font-size:32px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--muted);font-weight:500}
.stat-num.blue{color:var(--accent)}
.stat-num.yellow{color:var(--yellow)}
.stat-num.green{color:var(--green)}
.stat-num.red{color:var(--red)}

/* TOOLBAR */
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:220px;position:relative}
.search-wrap input{width:100%;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text);padding:10px 14px 10px 38px;border-radius:10px;font-size:14px;
  font-family:var(--font);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
select{background:var(--surface);border:1.5px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:10px;font-size:13px;font-family:var(--font);
  outline:none;cursor:pointer;transition:border-color .2s}
select:focus{border-color:var(--accent)}
.refresh-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);
  padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font);transition:all .2s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* TABLE */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.table-header{padding:18px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.table-header h2{font-size:14px;font-weight:600}
.table-count{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{padding:12px 20px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;background:var(--surface2);white-space:nowrap}
td{padding:14px 20px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(108,99,255,.04)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.badge-pending{background:rgba(255,170,0,.1);color:var(--yellow);border:1px solid rgba(255,170,0,.2)}
.badge-accepted{background:rgba(0,214,143,.1);color:var(--green);border:1px solid rgba(0,214,143,.2)}
.badge-rejected{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2)}

.actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;border:1px solid transparent;
  cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.btn-view{background:rgba(108,99,255,.1);color:var(--accent);border-color:rgba(108,99,255,.2)}
.btn-view:hover{background:rgba(108,99,255,.2)}
.btn-cv{background:rgba(0,214,143,.1);color:var(--green);border-color:rgba(0,214,143,.2)}
.btn-cv:hover{background:rgba(0,214,143,.2)}
.btn-accept{background:rgba(0,214,143,.1);color:var(--green);border-color:rgba(0,214,143,.2)}
.btn-accept:hover{background:rgba(0,214,143,.25)}
.btn-reject{background:rgba(255,71,87,.1);color:var(--red);border-color:rgba(255,71,87,.2)}
.btn-reject:hover{background:rgba(255,71,87,.2)}

.name-cell{font-weight:500}
.username-cell{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.empty-state{text-align:center;padding:60px;color:var(--muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.loading{text-align:center;padding:60px;color:var(--muted)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  width:560px;max-width:90vw;max-height:85vh;overflow-y:auto;
  box-shadow:0 40px 100px rgba(0,0,0,.8)}
.modal-head{padding:24px 28px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;
  background:var(--surface)}
.modal-head h2{font-size:16px;font-weight:700}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-body{padding:28px}
.modal-row{display:flex;gap:12px;margin-bottom:14px;font-size:13px}
.modal-key{color:var(--muted);font-weight:500;min-width:120px;font-size:12px;padding-top:1px}
.modal-val{color:var(--text);flex:1;line-height:1.5}
.modal-divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap}
.modal-btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;
  border:none;cursor:pointer;font-family:var(--font);transition:all .2s}
.modal-btn-cv{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff}
.modal-btn-accept{background:rgba(0,214,143,.15);color:var(--green);border:1px solid rgba(0,214,143,.3)}
.modal-btn-accept:hover{background:rgba(0,214,143,.25)}
.modal-btn-reject{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2)}
.modal-btn-reject:hover{background:rgba(255,71,87,.2)}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;
  z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:rgba(0,214,143,.4);color:var(--green)}
.toast.error{border-color:rgba(255,71,87,.4);color:var(--red)}

@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .container{padding:16px}
  header{padding:0 16px}
  th:nth-child(3),th:nth-child(4),td:nth-child(3),td:nth-child(4){display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🏢</div>
      <div>
        <h1>Nova HR</h1>
        <p>Admin Dashboard</p>
      </div>
    </div>
    <label class="login-label">Admin Password</label>
    <input class="login-input" type="password" id="pass" placeholder="Enter your password" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-err" id="err"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <header>
    <div class="header-left">
      <div class="header-logo">🏢</div>
      <span class="header-title">Nova HR Admin</span>
      <span class="header-badge">Dashboard</span>
    </div>
    <div class="header-right">
      <span class="header-time" id="clock"></span>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </header>
  <div class="container">
    <div class="stats">
      <div class="stat"><div class="stat-num blue" id="s-total">—</div><div class="stat-label">Total Applications</div></div>
      <div class="stat"><div class="stat-num yellow" id="s-pending">—</div><div class="stat-label">Pending Review</div></div>
      <div class="stat"><div class="stat-num green" id="s-accepted">—</div><div class="stat-label">Accepted</div></div>
      <div class="stat"><div class="stat-num red" id="s-rejected">—</div><div class="stat-label">Rejected</div></div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search name, email, position..." oninput="filter()"/>
      </div>
      <select id="fstatus" onchange="filter()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="accepted">Accepted</option>
        <option value="rejected">Rejected</option>
      </select>
      <select id="fpos" onchange="filter()"><option value="">All Positions</option></select>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="table-card">
      <div class="table-header">
        <h2>Applications</h2>
        <span class="table-count" id="tcount">Loading...</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Applicant</th>
            <th>Position</th>
            <th>Contact</th>
            <th>Background</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" class="loading">Loading applications...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Application</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token = localStorage.getItem('nhr_token') || '';
let subs = [];

// ── AUTH ──────────────────────────────────────────────────────────
async function doLogin() {
  const pass = document.getElementById('pass').value.trim();
  if (!pass) return;
  const err = document.getElementById('err');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pass})
    });
    const d = await r.json();
    if (d.success && d.token) {
      token = d.token;
      localStorage.setItem('nhr_token', token);
      showMain();
    } else {
      err.textContent = d.error || 'Incorrect password';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Connection error. Try again.';
    err.style.display = 'block';
  }
}

function logout() {
  token = '';
  localStorage.removeItem('nhr_token');
  subs = [];
  document.getElementById('main').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
}

function authH() {
  return {'Content-Type':'application/json','Authorization':'Bearer '+token};
}

// ── INIT ──────────────────────────────────────────────────────────
function showMain() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  tick(); setInterval(tick, 1000);
  loadData();
}

function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleString('en-US',
    {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,
     month:'short',day:'numeric'});
}

// ── LOAD DATA ─────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="7" class="loading">Loading...</td></tr>';
  try {
    const r = await fetch('/api/submissions', {headers: authH()});
    if (r.status === 401) { logout(); return; }
    const d = await r.json();
    subs = d.submissions || d.data || [];
    updateStats();
    fillPositions();
    render(subs);
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="7" class="empty-state"><div class="icon">⚠️</div>Failed to load: '+e.message+'</td></tr>';
  }
}

function updateStats() {
  document.getElementById('s-total').textContent = subs.length;
  document.getElementById('s-pending').textContent = subs.filter(s=>s.status==='pending'||!s.status).length;
  document.getElementById('s-accepted').textContent = subs.filter(s=>s.status==='accepted').length;
  document.getElementById('s-rejected').textContent = subs.filter(s=>s.status==='rejected').length;
}

function fillPositions() {
  const pos = [...new Set(subs.map(s=>s.position).filter(Boolean))];
  const sel = document.getElementById('fpos');
  sel.innerHTML = '<option value="">All Positions</option>' +
    pos.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
}

// ── RENDER ────────────────────────────────────────────────────────
function render(list) {
  document.getElementById('tcount').textContent = list.length + ' application' + (list.length!==1?'s':'');
  if (!list.length) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="7" class="empty-state"><div class="icon">📭</div>No applications found</td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML = list.map(s => {
    const st = s.status || 'pending';
    const date = (s.submitted_at||s.timestamp||'').substring(0,10);
    const cvBtn = s.cv_path
      ? `<button class="btn btn-cv" onclick="dlCV('${s.id}','${esc(s.cv_path)}')">📄 CV</button>`
      : '';
    return `<tr>
      <td><div class="name-cell">${esc(s.full_name||'—')}</div>
          <div class="username-cell">@${esc(s.telegram_username||'—')}</div></td>
      <td>${esc(s.position||'—')}</td>
      <td><div>${esc(s.email||'—')}</div><div style="color:var(--muted);font-size:11px">${esc(s.phone||'—')}</div></td>
      <td><div>${esc(s.education||'—')}</div><div style="color:var(--muted);font-size:11px">${esc(s.experience||'—')} · ${esc(s.gender||'—')}</div></td>
      <td><span class="badge badge-${st}">${st}</span></td>
      <td style="color:var(--muted);font-family:var(--mono);font-size:12px">${date}</td>
      <td><div class="actions">
        <button class="btn btn-view" onclick="viewSub('${s.id}')">👁 View</button>
        ${cvBtn}
        <button class="btn btn-accept" onclick="setStatus('${s.id}','accepted')">✓</button>
        <button class="btn btn-reject" onclick="setStatus('${s.id}','rejected')">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ── FILTER ────────────────────────────────────────────────────────
function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('fstatus').value;
  const pos = document.getElementById('fpos').value;
  render(subs.filter(s => {
    const mq = !q || [s.full_name,s.email,s.position,s.phone,s.telegram_username]
      .some(v=>v&&v.toLowerCase().includes(q));
    const ms = !st || (s.status||'pending')===st;
    const mp = !pos || s.position===pos;
    return mq && ms && mp;
  }));
}

// ── CV DOWNLOAD ───────────────────────────────────────────────────
async function dlCV(id, path) {
  toast('Generating download link...');
  try {
    const r = await fetch(`/api/submissions/${id}?action=cv_url`, {headers: authH()});
    const d = await r.json();
    if (d.cv_url) { window.open(d.cv_url,'_blank'); toast('✓ CV opened','success'); }
    else if (path.startsWith('http')) { window.open(path,'_blank'); toast('✓ CV opened','success'); }
    else toast('CV not available','error');
  } catch(e) {
    if (path.startsWith('http')) window.open(path,'_blank');
    else toast('Could not open CV','error');
  }
}

// ── VIEW MODAL ────────────────────────────────────────────────────
function viewSub(id) {
  const s = subs.find(x=>x.id===id);
  if (!s) return;
  const st = s.status||'pending';
  const links = Array.isArray(s.portfolio_links)&&s.portfolio_links.length
    ? s.portfolio_links.map(l=>`<a href="${l}" target="_blank" style="color:var(--accent)">${l}</a>`).join('<br>')
    : '—';
  document.getElementById('modal-title').textContent = s.full_name||'Application';
  document.getElementById('modal-body').innerHTML = `
    <span class="badge badge-${st}" style="margin-bottom:20px;display:inline-flex">${st}</span>
    ${row('💼 Position', s.position)}
    ${row('👤 Full Name', s.full_name)}
    ${row('📱 Phone', s.phone)}
    ${row('📧 Email', s.email)}
    ${row('🎂 Age', s.age)}
    ${row('⚧ Gender', s.gender)}
    ${row('🎓 Education', s.education)}
    ${row('📊 Experience', s.experience)}
    ${row('🔗 Telegram', '@'+(s.telegram_username||'—'))}
    ${row('🔗 Portfolio', links)}
    ${row('✍️ Cover Letter', `<span style="white-space:pre-wrap;line-height:1.6">${esc(s.cover_letter||'—')}</span>`)}
    ${row('📅 Submitted', (s.submitted_at||s.timestamp||'').replace('T',' ').substring(0,19))}
    <hr class="modal-divider"/>
    <div class="modal-actions">
      ${s.cv_path?`<button class="modal-btn modal-btn-cv" onclick="dlCV('${s.id}','${esc(s.cv_path)}')">📄 Download CV</button>`:''}
      <button class="modal-btn modal-btn-accept" onclick="setStatus('${s.id}','accepted');closeModal()">✓ Accept</button>
      <button class="modal-btn modal-btn-reject" onclick="setStatus('${s.id}','rejected');closeModal()">✕ Reject</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function row(k,v){return`<div class="modal-row"><span class="modal-key">${k}</span><span class="modal-val">${v||'—'}</span></div>`}
function closeModal(){document.getElementById('overlay').classList.remove('open')}

// ── STATUS UPDATE ─────────────────────────────────────────────────
async function setStatus(id, status) {
  try {
    const r = await fetch(`/api/submissions/${id}`, {
      method:'PATCH', headers: authH(),
      body: JSON.stringify({status})
    });
    const d = await r.json();
    if (d.success) {
      const s = subs.find(x=>x.id===id);
      if (s) s.status = status;
      updateStats(); filter();
      toast(status==='accepted'?'✓ Accepted':'✕ Rejected', status==='accepted'?'success':'error');
    } else toast('Update failed: '+(d.error||''),'error');
  } catch(e) { toast('Error: '+e.message,'error'); }
}

// ── UTILS ─────────────────────────────────────────────────────────
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

// ── KEYBOARD ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('login').style.display!=='none') doLogin();
  if (e.key==='Escape') closeModal();
});

// ── AUTO LOGIN ────────────────────────────────────────────────────
if (token) {
  fetch('/api/submissions?limit=1', {headers: authH()})
    .then(r => r.status===401 ? logout() : showMain())
    .catch(() => showMain());
}
</script>
